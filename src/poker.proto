// poker.proto
syntax = "proto3";

package poker;

message PokerConfig {
  repeated double bet_sizes = 1;
  int32 starting_stack_size = 2;
  int32 max_depth = 3;
  bool enable_logging = 4;
  int32 small_blind = 5;
  int32 big_blind = 6;
  int32 chance_samples = 7;
  reserved 8;
  reserved "max_raises_per_street";
  repeated double preflop_bet_sizes = 9;
  repeated double flop_bet_sizes = 10;
  repeated double turn_bet_sizes = 11;
  repeated double river_bet_sizes = 12;
  bool regret_only_training = 13;
  // Maximum number of info sets to allocate. 0 means unlimited.
  int64 max_info_sets = 14;
  // Number of threads for parallel training. 0 or 1 = single-threaded.
  int32 num_training_threads = 15;
  reserved 16;
  reserved "warmup_iterations";
  // Maximum number of compact public-state rows to allocate. 0 means unlimited.
  int64 max_public_states = 17;
}

enum Street {
  PREFLOP = 0;
  FLOP = 1;
  TURN = 2;
  RIVER = 3;
}
